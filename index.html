<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>表情ランナー</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-title" content="表情ランナー" />
  </head>
  <body>
    <div id="appShell">
      <div id="gameStage">
        <video id="video" playsinline></video>
        <canvas id="gameCanvas"></canvas>
        <div id="uiRoot">
          <section class="boot-screen" data-boot-mode="loading">
            <div class="boot-card">
              <span class="eyebrow">testflight beta</span>
              <h2>表情ランナーを起動中…</h2>
              <p>初回起動やアップデート直後は、数秒ほど準備に時間がかかることがあります。</p>
              <div class="boot-meta">
                <strong>起動ステージ</strong>
                <span>読み込みを開始しています…</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
