<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>表情ランナー</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-title" content="表情ランナー" />
  </head>
  <body>
    <div
      id="hardBootStamp"
      style="
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        padding:
          calc(24px + env(safe-area-inset-top))
          calc(24px + env(safe-area-inset-right))
          calc(24px + env(safe-area-inset-bottom))
          calc(24px + env(safe-area-inset-left));
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.28), transparent 36%),
          linear-gradient(180deg, #0f172a, #05121f);
        color: #ffffff;
        pointer-events: auto;
        box-sizing: border-box;
      "
    >
      <div
        id="hardBootStampText"
        style="
          max-width: 760px;
          width: 100%;
          text-align: center;
          white-space: pre-line;
          font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
          font-size: clamp(24px, 4vw, 42px);
          line-height: 1.5;
          font-weight: 700;
          letter-spacing: 0.02em;
        "
      >表情ランナー
TestFlight診断ビルド
Build 3
HTML表示確認中…</div>
    </div>

    <div id="appShell">
      <div id="gameStage">
        <video id="video" playsinline></video>
        <canvas id="gameCanvas"></canvas>
        <div id="uiRoot">
          <section class="boot-screen" data-boot-mode="loading">
            <div class="boot-card">
              <span class="eyebrow">testflight beta</span>
              <h2>表情ランナーを起動中…</h2>
              <p>初回起動やアップデート直後は、数秒ほど準備に時間がかかることがあります。</p>
              <div class="boot-meta">
                <strong>起動ステージ</strong>
                <span>読み込みを開始しています…</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__EMOTION_RUNNER_STATIC_HTML_LOADED__ = true;
        window.__EMOTION_RUNNER_BUILD__ = "3";
        var stampText = document.getElementById("hardBootStampText");

        function setLines(lines) {
          if (stampText) {
            stampText.textContent = lines.join("\n");
          }
        }

        setTimeout(function () {
          if (window.__EMOTION_RUNNER_APP_READY__ === true) return;
          setLines([
            "表情ランナー",
            "Build 3",
            "起動処理がまだ完了していません",
            "JSまたはアセット読み込みで停止している可能性があります",
          ]);
        }, 2000);

        setTimeout(function () {
          if (window.__EMOTION_RUNNER_APP_READY__ === true) return;
          setLines([
            "表情ランナー",
            "Build 3",
            "診断: index.htmlは表示されています",
            "main.tsまたはapp.tsの起動に失敗している可能性があります",
          ]);
        }, 5000);
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
